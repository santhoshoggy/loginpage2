<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card">
    <h2>Register</h2>

    <div id="error-msg" class="msg error hidden"></div>

    <form id="register-form">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter username" required />

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter password" required />

      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Enter email" required />

      <label for="phone">Mobile Number</label>
      <input type="tel" id="phone" placeholder="Enter 10-digit mobile number" maxlength="10" required />

      <button type="submit">Register &amp; Send OTP</button>
    </form>

    <p class="switch-link">Already have an account? <a href="index.html">Login</a></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
