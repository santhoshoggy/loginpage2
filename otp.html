<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OTP Verification</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card">
    <h2>OTP Verification</h2>
    <p id="otp-info" class="info-text">Enter the 6-digit OTP sent to your email and mobile.</p>

    <div id="error-msg" class="msg error hidden"></div>
    <div id="success-msg" class="msg success hidden"></div>

    <form id="otp-form">
      <label for="otp">Enter OTP</label>
      <input type="text" id="otp" placeholder="6-digit OTP" maxlength="6" required />

      <button type="submit">Verify OTP</button>
    </form>

    <p class="switch-link" id="back-link"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
